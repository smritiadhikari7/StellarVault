name: CI/CD Pipeline & Vercel Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Run Typecheck
        run: npm run typecheck
        working-directory: ./Frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: ./Frontend

  build:
    name: Build Production Bundle
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Build Application
        run: npm run build
        working-directory: ./Frontend
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID }}
          VITE_POOL_TREASURY_ADDRESS: ${{ secrets.VITE_POOL_TREASURY_ADDRESS }}
          VITE_ADMIN_ADDRESS: ${{ secrets.VITE_ADMIN_ADDRESS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./Frontend

      - name: Run Playwright E2E Tests
        run: npm run test:e2e
        working-directory: ./Frontend
        env:
          CI: "true"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 14

  deploy:
  name: Deploy to Vercel
  runs-on: ubuntu-latest
  needs: [lint-and-typecheck, build, e2e-tests]
  if: github.ref == 'refs/heads/main' && github.event_name == 'push'

  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: Frontend/package-lock.json

    - name: Install Dependencies
      working-directory: ./Frontend
      run: npm ci

    - name: Install Latest Vercel CLI
      run: npm install -g vercel@latest

    - name: Pull Vercel Environment
      working-directory: ./Frontend
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

    - name: Build Project
      working-directory: ./Frontend
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

    - name: Deploy to Vercel
      working-directory: ./Frontend
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel-args: "--prod"
