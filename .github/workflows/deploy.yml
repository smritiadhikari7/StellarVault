name: CI/CD Pipeline & Vercel Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  pipeline:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./Frontend
        run: npm ci

      - name: Run Typecheck
        working-directory: ./Frontend
        run: npm run typecheck

      - name: Run ESLint
        working-directory: ./Frontend
        run: npm run lint

      - name: Build Application
        working-directory: ./Frontend
        run: npm run build
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID }}
          VITE_POOL_TREASURY_ADDRESS: ${{ secrets.VITE_POOL_TREASURY_ADDRESS }}
          VITE_ADMIN_ADDRESS: ${{ secrets.VITE_ADMIN_ADDRESS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Install Playwright Browsers
        working-directory: ./Frontend
        run: npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        working-directory: ./Frontend
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 14

      - name: Install Latest Vercel CLI
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./Frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./Frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./Frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}