name: CI/CD Pipeline & Vercel Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  WORKING_DIR: ./Frontend

jobs:
  # ---------------------------------------------------------------
  # 1. Build, Lint & Test — runs on every push and PR
  # ---------------------------------------------------------------
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Verify Node & npm
        run: |
          node --version
          npm --version
          which npm

      - name: Install Dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Run Typecheck
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run typecheck

      - name: Run ESLint
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run lint

      - name: Build Application
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID }}
          VITE_POOL_TREASURY_ADDRESS: ${{ secrets.VITE_POOL_TREASURY_ADDRESS }}
          VITE_ADMIN_ADDRESS: ${{ secrets.VITE_ADMIN_ADDRESS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Frontend/package-lock.json') }}

      - name: Install Playwright Browsers (cache miss)
        working-directory: ${{ env.WORKING_DIR }}
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS Deps Only (cache hit)
        working-directory: ${{ env.WORKING_DIR }}
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright E2E Tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 14

  # ---------------------------------------------------------------
  # 2. Deploy — only on push to main, only after tests pass
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Verify Node & npm
        run: |
          node --version
          npm --version
          which npm

      # Installing deps here means node_modules already exists, so
      # `vercel build` will NOT try to spawn its own install step
      # (this is what caused the earlier "spawn npm ENOENT" error).
      - name: Install Dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify Vercel Token
        working-directory: ${{ env.WORKING_DIR }}
        run: vercel whoami --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Pull Vercel Environment
        working-directory: ${{ env.WORKING_DIR }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production
     
      - name: Build Project Artifacts
        working-directory: ${{ env.WORKING_DIR }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID }}
          VITE_POOL_TREASURY_ADDRESS: ${{ secrets.VITE_POOL_TREASURY_ADDRESS }}
          VITE_ADMIN_ADDRESS: ${{ secrets.VITE_ADMIN_ADDRESS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: ${{ env.WORKING_DIR }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prebuilt --prod)
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"
